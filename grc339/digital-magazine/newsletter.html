        <body>
            <div class="centered">
                
                <header>
                    <h1><a href="index.html"><img src="Threshold_Logo.svg" alt="Threshold."></a> </h1>
                    <nav>
                        <ul>
                            <li><a href="#">News</a></li>

                        </ul>
                    </nav>
                </header>

                <main>
                    <h2 class="white">Subscribe to Our Newsletter</h2>
                    <form>
                        <section class="personal-info">
                            <h3>Personal information</h3>
                            <ul>
                                <li><label for="name">Name:</label> <input type="text" name="name" id="name" placeholder="your full name" /></li>
                                <li><label for="email">Email:</label> <input type="email" name="email" id="email" placeholder="confirmation email" /></li>
                            </ul>
                        </section>

                        <section class="newsletter">
                            <h3>Newsletters</h3>

                            <ul>
                                <li><input type="checkbox" id="this week in science" value="this week in science" name="this week in science" /> <label for="this week in science">This Week in Science</label></li>
                                <li><input type="checkbox" id="the earth edition" value="the earth edition" name="the earth edition" /> <label for="the earth edition">The Earth Edition</label></li>
                                <li><input type="checkbox" id="health & medicine" value="health & medicine" name="health & medicine" /> <label for="health & medicine">Health & Medicine</label></li>
                                <li><input type="checkbox" id="book club" value="book club" name="book club" /> <label for="book club">Book Club</label></li>
                            </ul>
                        </section>

                        <section class="subscribe">
                            <button type="order">Subscribe</button>
                        </section>
                    </form>
                    <figure>
                        <img src="grass_cell.jpg" alt="A grass cell under a microscope.">
                    </figure>
                </main>

                <footer>
                    <p>All rights reserved.</p>
                </footer>

            </div>
